basePath: /api
definitions:
  handler.commentRequest:
    properties:
      comment:
        type: string
    type: object
  handler.errorResponse:
    properties:
      error:
        type: string
    type: object
  handler.exerciseRequest:
    properties:
      description:
        type: string
      muscle_group:
        type: string
      name:
        type: string
    type: object
  handler.loginRequest:
    properties:
      login:
        type: string
      password:
        type: string
    type: object
  handler.metricRequest:
    properties:
      bicep_cm:
        type: number
      body_fat_percent:
        type: number
      chest_cm:
        type: number
      hips_cm:
        type: number
      measured_at:
        description: '"2006-01-02"'
        type: string
      waist_cm:
        type: number
      weight_kg:
        type: number
    type: object
  handler.registerRequest:
    properties:
      email:
        type: string
      login:
        type: string
      password:
        type: string
    type: object
  handler.scheduleCreateRequest:
    properties:
      client_id:
        type: integer
      duration_minutes:
        type: integer
      notes:
        type: string
      scheduled_at:
        description: '"2026-01-05T10:00"'
        type: string
      title:
        type: string
    type: object
  handler.scheduleUpdateRequest:
    properties:
      client_id:
        type: integer
      duration_minutes:
        type: integer
      notes:
        type: string
      scheduled_at:
        type: string
      status:
        type: string
      title:
        type: string
    type: object
  handler.templateExerciseRequest:
    properties:
      exercise_id:
        type: integer
      reps:
        type: integer
      sets:
        type: integer
      weight_kg:
        type: number
    type: object
  handler.templateRequest:
    properties:
      exercises:
        items:
          $ref: '#/definitions/handler.templateExerciseRequest'
        type: array
      is_public:
        type: boolean
      name:
        type: string
    type: object
  handler.tokenResponse:
    properties:
      token:
        type: string
    type: object
  handler.volumeResponse:
    properties:
      weekly_volume:
        type: number
    type: object
  handler.workoutExerciseRequest:
    properties:
      exercise_id:
        type: integer
      reps:
        type: integer
      sets:
        type: integer
      weight_kg:
        type: number
    type: object
  handler.workoutRequest:
    properties:
      date:
        type: string
      duration_minutes:
        type: integer
      exercises:
        items:
          $ref: '#/definitions/handler.workoutExerciseRequest'
        type: array
      notes:
        type: string
      title:
        type: string
    type: object
  models.BodyMetric:
    properties:
      bicep_cm:
        type: number
      body_fat_percent:
        type: number
      chest_cm:
        type: number
      created_at:
        type: string
      hips_cm:
        type: number
      id:
        type: integer
      measured_at:
        type: string
      user_id:
        type: integer
      waist_cm:
        type: number
      weight_kg:
        type: number
    type: object
  models.Exercise:
    properties:
      description:
        type: string
      id:
        type: integer
      muscle_group:
        type: string
      name:
        type: string
    type: object
  models.ExerciseProgress:
    properties:
      date:
        type: string
      max_weight:
        type: number
    type: object
  models.Role:
    enum:
    - user
    - admin
    type: string
    x-enum-varnames:
    - RoleUser
    - RoleAdmin
  models.ScheduleEntry:
    properties:
      client_id:
        type: integer
      client_login:
        description: populated via JOIN
        type: string
      created_at:
        type: string
      duration_minutes:
        type: integer
      id:
        type: integer
      notes:
        type: string
      scheduled_at:
        type: string
      status:
        type: string
      title:
        type: string
      trainer_id:
        type: integer
    type: object
  models.TemplateExercise:
    properties:
      exercise_id:
        type: integer
      id:
        type: integer
      reps:
        type: integer
      sets:
        type: integer
      template_id:
        type: integer
      weight_kg:
        type: number
    type: object
  models.User:
    properties:
      created_at:
        type: string
      email:
        type: string
      id:
        type: integer
      login:
        type: string
      role:
        $ref: '#/definitions/models.Role'
      telegram_chat_id:
        type: integer
      telegram_id:
        type: integer
    type: object
  models.Workout:
    properties:
      created_at:
        type: string
      date:
        type: string
      duration_minutes:
        type: integer
      exercises:
        items:
          $ref: '#/definitions/models.WorkoutExercise'
        type: array
      id:
        type: integer
      notes:
        type: string
      title:
        type: string
      trainer_comment:
        type: string
      user_id:
        type: integer
    type: object
  models.WorkoutExercise:
    properties:
      exercise_id:
        type: integer
      id:
        type: integer
      reps:
        type: integer
      sets:
        type: integer
      weight_kg:
        type: number
      workout_id:
        type: integer
    type: object
  models.WorkoutTemplate:
    properties:
      exercises:
        items:
          $ref: '#/definitions/models.TemplateExercise'
        type: array
      id:
        type: integer
      is_public:
        type: boolean
      name:
        type: string
      user_id:
        type: integer
    type: object
host: localhost:8080
info:
  contact: {}
  description: REST API for tracking workouts, exercises, body metrics and trainer
    schedule.
  title: Workout Tracker API
  version: "1.0"
paths:
  /admin/schedule:
    get:
      parameters:
      - description: Week start date (YYYY-MM-DD). Defaults to current week.
        in: query
        name: week
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            items:
              $ref: '#/definitions/models.ScheduleEntry'
            type: array
      security:
      - BearerAuth: []
      summary: List trainer schedule
      tags:
      - admin
    post:
      consumes:
      - application/json
      parameters:
      - description: Schedule data
        in: body
        name: body
        required: true
        schema:
          $ref: '#/definitions/handler.scheduleCreateRequest'
      produces:
      - application/json
      responses:
        "201":
          description: Created
          schema:
            $ref: '#/definitions/models.ScheduleEntry'
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/handler.errorResponse'
      security:
      - BearerAuth: []
      summary: Create schedule entry
      tags:
      - admin
  /admin/schedule/{id}:
    delete:
      parameters:
      - description: Schedule entry ID
        in: path
        name: id
        required: true
        type: integer
      responses:
        "204":
          description: No Content
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/handler.errorResponse'
        "403":
          description: Forbidden
          schema:
            $ref: '#/definitions/handler.errorResponse'
      security:
      - BearerAuth: []
      summary: Delete schedule entry
      tags:
      - admin
    put:
      consumes:
      - application/json
      parameters:
      - description: Schedule entry ID
        in: path
        name: id
        required: true
        type: integer
      - description: Updated fields
        in: body
        name: body
        required: true
        schema:
          $ref: '#/definitions/handler.scheduleUpdateRequest'
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/models.ScheduleEntry'
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/handler.errorResponse'
        "403":
          description: Forbidden
          schema:
            $ref: '#/definitions/handler.errorResponse'
        "404":
          description: Not Found
