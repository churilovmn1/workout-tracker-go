services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: workout_tracker
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5433:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"

  app:
    build: .
    ports:
      - "8080:8080"
    environment:
      PORT: "8080"
      DATABASE_URL: postgres://postgres:postgres@db:5432/workout_tracker?sslmode=disable
      JWT_SECRET: change-me-in-production
      REDIS_URL: redis://redis:6379/0
    depends_on:
      - db
      - redis

  migrate:
    image: migrate/migrate
    volumes:
      - ./migrations:/migrations
    command:
      - "-path=/migrations"
      - "-database=postgres://postgres:postgres@db:5432/workout_tracker?sslmode=disable"
      - "up"
    depends_on:
      - db

volumes:
  pgdata:
